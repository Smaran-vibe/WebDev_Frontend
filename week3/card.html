<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .cardContainer {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 12px;
    }

    .card {

        height: 60vh;
        width: 22vw;
        display: flex;
        justify-content: start;
        flex-direction: column;
        align-items: center;
        border-radius: 10px;
        transition: 0.3s ease-in-out;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);

    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    .img {
        height: 100px;
        width: 100px;
        margin-top: 24px;
    }


    .img img {
        height: 100%;
        width: 100%;
        object-fit: cover;
        border-radius: 50%;
        align-items: center;
    }

    .title {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 9px;
    }

    .title h3 {
        margin-top: 5px;
        font-size: 28px;
    }

    .horizontal-line {
        width: 80%;
        border: 1px solid rgb(153, 149, 149);
        margin: 20px;
    }

    .para {
        margin-top: 6px;
        width: 80%;
        text-align: center;
    }

    .btn {
        padding: 12px 53px;
        border-radius: 8px;
        margin-top: 20px;
        border: none;
        color: white;
        background: red;
        transition: 0.3s ease-in-out;
        cursor: pointer;
    }

    .btn:hover {
        transform: scale(1.02);
    }


    .socials {
        display: flex;
        gap: 12px;
        margin-top: 40px;
    }

    .social-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #f1f1f1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.3s ease;
    }

    .social-icon:hover {
        transform: scale(1.15);
    }

    .social-icon.insta:hover {
        background: #E1306C;
    }

    .social-icon.insta:hover svg {
        fill: white;
    }

    .social-icon.x:hover {
        background: #000;
    }

    .social-icon.x:hover svg {
        fill: white;
    }

    .social-icon.github:hover {
        background: #333;
    }

    .social-icon.github:hover svg {
        fill: white;
    }

    .social-icon.linkedin:hover {
        background: #0077B5;
    }

    .social-icon.linkedin:hover svg {
        fill: white;
    }

    .social-icon svg {
        fill: #555;
        transition: 0.3s ease;
    }
</style>

<body>
    <div class="cardContainer">
        <div class="card">
            <div class="img">
                <img src="profile.jpg" alt="">
            </div>
            <div class="title">
                <h3>Smaran Aryal</h3>
                <p>FullStack Developer</p>
            </div>
            <div class="horizontal-line"></div>
            <div class="para">
                <p>Passionate about learning and developing website in proper manner</p>
            </div>

</body>
