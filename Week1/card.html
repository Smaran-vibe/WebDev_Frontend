<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .card {
        background: hotpink;
        color: white;
        padding: 2px 29px;
        border-radius: 16px;
        width: 128px;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
        line-height: 1px;
    }

    .circle {
        background-color: hotpink;
        color: white;
        height: 100px;
        width: 100px;
        border-radius: 50%;
        padding: 6px 10px;
        text-align: center;
        line-height: 4;
        margin-top: 13px;
        font-weight: bold;

    }
</style>

<body>
    <div class="card">
        <p>Hello World</p>
    </div>
    <!-- 
    <div class="card" style = "height: 50px; width: 98px; height: 89px; background-color: aqua; font-size: 19px; font-weight: bold;"> -->

    <div class="circle">
        <p>Circle</p>
    </div>
</body>

</html>
