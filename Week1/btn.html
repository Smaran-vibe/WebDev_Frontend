<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .btn {

        background:  #d3fb52;
        color: black;
        padding: 13px 21px;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 300;
        cursor: pointer;
    }

    .title {
        color: #d3fb52;
        font-size: 40px;
        font-weight: 800;
        letter-spacing: 2px;
        
    }
    .title h1{
        margin: 0;
    }

    .body {

        color: #b8b8c0;
        font-size: 16px;
        line-height: 1.7;
        max-width: 320px;
    }
    .box{
        background: #1d1d22;
        color: #d3fb52;
        padding: 24px;
        border: 3px solid #ff5c4d;
        margin: 20px;
        border-radius: 12px;
        text-align: center;
        width: 300px;
        

    }
</style>

<body>
<div class="container">

    <div class="title">
        <h1>Big Energy</h1>
    </div>
    <div class="body">
        <p>This paragraph is your playground.Adjust the values on the left and watch typography come alive Lorem ipsum
            dolor sit amet consectetur adipisicing elit. Voluptas quae quaerat dolor autem debitis, libero voluptatem
            odit temporibus. Praesentium eligendi minima saepe quis.</p>
    </div>

    <div class="box">
        I am a box bro
    </div>

    <button class="btn">CLICK ME</button>
</div>

</body>

</html>
